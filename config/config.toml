# Repo-scoped awdit config example.
# Durable local resource defaults live under:
#   - config/resources/shared/
#   - config/resources/slots/<slot>/
# awdit includes everything under those folders by default.
# In the common case, this config only needs exclude rules.
# Use include only for explicit URLs or out-of-tree paths.
#
# Model selection note (updated 2026-03-29):
# Run `awdit list-models` periodically to refresh the OpenAI model IDs available
# to your account before editing `providers.<name>.allowed_models` and
# `slots.<slot_name>.default_model`.

active_provider = "openai"

[providers.openai]
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com/v1"
allowed_models = ["gpt-5.4", "gpt-5.4-mini"]

[slots.hunter_1]
default_model = "gpt-5.4-mini"
reasoning_effort = "low"
prompt_file = "prompts/hunter_1.md"

[slots.hunter_2]
default_model = "gpt-5.4-mini"
reasoning_effort = "low"
prompt_file = "prompts/hunter_2.md"

[slots.skeptic_1]
default_model = "gpt-5.4"
reasoning_effort = "medium"
prompt_file = "prompts/skeptic_1.md"

[slots.skeptic_2]
default_model = "gpt-5.4-mini"
reasoning_effort = "low"
prompt_file = "prompts/skeptic_2.md"

[slots.referee_1]
default_model = "gpt-5.4"
reasoning_effort = "medium"
prompt_file = "prompts/referee_1.md"

[slots.referee_2]
default_model = "gpt-5.4-mini"
reasoning_effort = "low"
prompt_file = "prompts/referee_2.md"

[slots.solver_1]
default_model = "gpt-5.4"
reasoning_effort = "medium"
prompt_file = "prompts/solver_1.md"

[slots.solver_2]
default_model = "gpt-5.4-mini"
reasoning_effort = "low"
prompt_file = "prompts/solver_2.md"

[scope]
include = [
  "src/awdit/**",
  "tests/**",
  "config/prompts/**",
  "config/config.toml",
  "config/config.toml.example",
  "pyproject.toml",
  "uv.lock",
  ".gitignore",
]
exclude = [
  "src/awdit/__pycache__/**",
  "tests/__pycache__/**",
  "src/awdit.egg-info/**",
  "config/resources/**",
  "docs/**",
  ".env",
  ".env.example",
]


[[validation.checks]]
name = "pytest"
command = "pytest -q"
timeout_seconds = 600

[repo_memory]
enabled = true
require_danger_map_approval = true
confirm_refresh_on_startup = true
auto_update_on_completion = true

[resources.shared]
include = [
  "README.md",
  "docs/architecture.md",
  "docs/agent-isolation-workflow.md",
  "docs/PROPOSED_FILE_STRUCTURE_CONFIG_BEHAVIOUR.txt",
  "docs/e2e-cli-walkthrough.txt",
]
exclude = []


[resources.slots.hunter_1]
exclude = []

[resources.slots.hunter_2]
exclude = []

[resources.slots.skeptic_1]
exclude = []

[resources.slots.skeptic_2]
exclude = []

[resources.slots.referee_1]
exclude = []

[resources.slots.referee_2]
exclude = []

[resources.slots.solver_1]
exclude = []

[resources.slots.solver_2]
exclude = []

# Optional advanced examples:
# [resources.shared]
# include = ["https://internal.example/wiki/refund-trust-boundaries"]
#
# [resources.slots.referee_1]
# include = ["~/notes/webhook-checklist.md"]

[github]
prefer_gh = true
